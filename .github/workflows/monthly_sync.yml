name: Monthly Google Photos Sync

on:
  schedule:
    - cron: '0 0 1 * *' # Kjører midnatt den 1. hver måned
  workflow_dispatch: # Tillater manuell kjøring fra GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run sync script
        run: python gruver/sync_google_photos.py

      - name: Deploy to Server via FTP
        run: |
          python upload_ftp.py gruver/albumgooglephotos gruver
          python upload_ftp.py gruver/sync_registry.json gruver

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add gruver/albumgooglephotos gruver/sync_registry.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync Google Photos album" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
