<!DOCTYPE html>
<html>

<head>
    <title>Sjekk Historiske Kart</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .info {
            position: absolute;
            top: 10px;
            left: 50px;
            background: white;
            padding: 10px;
            z-index: 1000;
            border: 2px solid green;
            border-radius: 5px;
            font-family: sans-serif;
        }
    </style>
</head>

<body>

    <div class="info">
        <b>Tester:</b> Kartverkets Historiske Kartarkiv<br>
        <b>Tjeneste:</b> <code>wms.historiskekart</code><br>
        <b>Lag:</b> historisk3 (1900-1950)
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([59.2096, 9.6084], 14);

        // Forsøker å laste historisk kartlag 3
        L.tileLayer.wms('test_kart_proxy.php', {
            layers: 'historisk3',
            format: 'image/png',
            transparent: true,
            version: '1.1.1',
            attribution: '© Kartverket Historiske Kart'
        }).addTo(map);
    </script>
</body>

</html>
