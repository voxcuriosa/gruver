<!DOCTYPE html>
<html>

<head>
    <title>Final Proxy Test - Skien 1966</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .info {
            position: absolute;
            top: 10px;
            left: 50px;
            background: white;
            padding: 10px;
            z-index: 1000;
            border: 2px solid orange;
            border-radius: 5px;
            font-family: sans-serif;
        }
    </style>
</head>

<body>

    <div class="info">
        <b>Status:</b> Testing <code>test_proxy.php</code> with GeoID Auth.<br>
        <b>Layer:</b> Skien 1966 (ID: 530)
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Center map on Skien
        var map = L.map('map').setView([59.2096, 9.6084], 14);

        // 1. HISTORICAL LAYER (WMS) - Proper Leaflet WMS implementation
        L.tileLayer.wms('test_proxy.php', {
            svc: 'wms',
            layers: '530',
            format: 'image/png',
            transparent: true,
            version: '1.1.1',
            attribution: '© Norge i bilder (1966)'
        }).addTo(map);

        // 2. MODERN ORTHOPHOTO (WMTS) - Semi-transparent overlay
        L.tileLayer('test_proxy.php?svc=wmts&layer=Nibcache_web_mercator_v2&tilematrixset=Nibcache_web_mercator_v2&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/png&TileMatrix={z}&TileCol={x}&TileRow={y}', {
            opacity: 0.4,
            attribution: '© Moderne Ortofoto'
        }).addTo(map);
    </script>
</body>

</html>
